name: context-preserver
kind: skill
description: Automatically save and restore development context to minimize cognitive
  load when resuming work. Use when switching tasks, taking breaks, or returning after
  interruptions. Captures mental state, file locations, and next steps. Designed for
  ADHD developers with high context-switching costs.
preconditions:
- check: project_initialized
  description: Project environment is set up
  required: true
effects:
- provides_capability
domains: &id001
- ai
- api
- frontend
- backend
- security
- testing
- product
- design
- data
- orchestration
cost: medium
latency: medium
risk_level: low
side_effects:
- modifies_files
- creates_artifacts
idempotent: false
success_signal: context-preserver capability successfully applied
failure_signals:
